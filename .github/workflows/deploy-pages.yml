name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Prepare deployment
        run: |
          mkdir -p _site
          cp index.html style.css script.js _site/
          cp -r assets _site/
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ github.event.deployment.payload.web_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
