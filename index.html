<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickLook - Text Extractor</title>
  <link rel="icon" type="image/png" href="assets/quicklook-icon.png" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="site-header">
      <h1 class="brand">QuickLook</h1>
      <p class="tagline">Extract links, emails, phone numbers, and keywords from any text.</p>
    </header>

    <label for="inputText" class="visually-hidden">Input text to extract from</label>
    <textarea id="inputText" placeholder="Paste or type text here..." aria-label="Paste or type text here"></textarea>

    <div class="controls" role="group" aria-label="Actions">
      <div class="toolbar">
        <button id="extractBtn" class="control-btn primary" onclick="extractText()">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </span>
          <span class="label">Extract</span>
        </button>
        <button id="clearBtn" class="control-btn" onclick="clearAll()">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </span>
          <span class="label">Clear</span>
        </button>
        <div class="spacer"></div>
        <button id="exportJsonBtn" class="control-btn" onclick="exportJSON()">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-download"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </span>
          <span class="label">JSON</span>
        </button>
        <button id="exportCsvBtn" class="control-btn" onclick="exportCSV()">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-text"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line></svg>
          </span>
          <span class="label">CSV</span>
        </button>
      </div>
    </div>

    <div class="output" id="results" role="region" aria-live="polite" aria-label="Extraction results">
      <div id="sr-announce" class="visually-hidden" aria-live="polite"></div>
      <section id="links" class="result-section">
        <h2 class="section-header" style="display: flex; align-items: center; gap: 0.5em;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-link"><path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1"/><path d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 0 1-7-7l1-1"/></svg>
          <span class="title">Links</span>
          <span class="count" aria-hidden="true"></span>
          <div class="section-controls">
            <button class="section-copy" onclick="copySection('links')" title="Copy all links">Copy all</button>
          </div>
        </h2>
        <ul></ul>
      </section>
      <section id="emails" class="result-section">
        <h2 class="section-header" style="display: flex; align-items: center; gap: 0.5em;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 6-10 7L2 6"/></svg>
          <span class="title">Emails</span>
          <span class="count" aria-hidden="true"></span>
          <div class="section-controls">
            <button class="section-copy" onclick="copySection('emails')" title="Copy all emails">Copy all</button>
          </div>
        </h2>
        <ul></ul>
      </section>
      <section id="phones" class="result-section">
        <h2 class="section-header" style="display: flex; align-items: center; gap: 0.5em;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-phone"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 2.08 4.18 2 2 0 0 1 4.06 2h3a2 2 0 0 1 2 1.72c.13.81.36 1.6.68 2.34a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.74-1.74a2 2 0 0 1 2.11-.45c.74.32 1.53.55 2.34.68A2 2 0 0 1 22 16.92z"/></svg>
          <span class="title">Phone Numbers</span>
          <span class="count" aria-hidden="true"></span>
          <div class="section-controls">
            <button class="section-copy" onclick="copySection('phones')" title="Copy all phones">Copy all</button>
          </div>
        </h2>
        <ul></ul>
      </section>
      <section id="keywords" class="result-section">
        <h2 class="section-header" style="display: flex; align-items: center; gap: 0.5em;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-text"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
          <span class="title">Top Keywords</span>
          <span class="count" aria-hidden="true"></span>
          <div class="section-controls">
            <button class="section-copy" onclick="copySection('keywords')" title="Copy all keywords">Copy all</button>
          </div>
        </h2>
        <ul></ul>
      </section>
    </div>
  </main>

  <!-- Mobile sticky action bar (visible on small screens) -->
  <div class="mobile-bar" role="toolbar" aria-label="Mobile actions">
    <button class="control-btn mobile" onclick="extractText()" aria-label="Extract">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </button>
    <button class="control-btn mobile" onclick="clearAll()" aria-label="Clear">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <button class="control-btn mobile" onclick="exportJSON()" aria-label="Export JSON">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    </button>
    <button class="control-btn mobile" onclick="exportCSV()" aria-label="Export CSV">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line></svg>
    </button>
  </div>

  <footer>
    <p>Made by <strong>Bijan Murmu</strong></p>
    <div class="social">
      <a href="https://github.com/bijanmurmu/quicklook" target="_blank" title="GitHub">
        <img src="assets/github.png" alt="GitHub logo" />
      </a>
      <a href="https://linkedin.com/in/bijanmurmu" target="_blank" title="LinkedIn">
        <img src="assets/linkedin.png" alt="LinkedIn logo" />
      </a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
